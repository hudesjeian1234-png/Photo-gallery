<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An accessible interactive photo gallery featuring nature photography with keyboard navigation support">
    <title>Accessible Interactive Photo Gallery</title>
    <link rel="stylesheet" href="Untitled-2.css">
</head>
<body>
    <header>
        <h1>Accessible Nature Photo Gallery</h1>
        <p class="intro">Use mouse hover or keyboard Tab key to navigate through images</p>
    </header>
    
    <main>
        <!-- Main display area with ARIA live region for screen readers -->
        <div id="image" 
             role="img" 
             aria-live="polite" 
             aria-label="Main display area for selected image">
            Hover over or focus on an image below to display here.
        </div>
        
        <!-- Gallery container with ARIA label -->
        <div class="gallery" 
             role="region" 
             aria-label="Photo gallery with 6 nature images">
            
            <figure class="photo-figure">
                <img class="preview" 
                     src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=300&fit=crop" 
                     alt="Sunrise over misty mountains with golden light breaking through clouds"
                     onmouseover="upDate(this)" 
                     onmouseout="undo()"
                     onfocus="upDate(this)"
                     onblur="undo()">
                <figcaption>Mountain Sunrise</figcaption>
            </figure>
            
            <figure class="photo-figure">
                <img class="preview" 
                     src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=400&h=300&fit=crop" 
                     alt="Waterfall cascading down mossy rocks in a lush green forest"
                     onmouseover="upDate(this)" 
                     onmouseout="undo()"
                     onfocus="upDate(this)"
                     onblur="undo()">
                <figcaption>Forest Waterfall</figcaption>
            </figure>
            
            <figure class="photo-figure">
                <img class="preview" 
                     src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=300&fit=crop" 
                     alt="Tropical beach with turquoise water and white sand palm trees"
                     onmouseover="upDate(this)" 
                     onmouseout="undo()"
                     onfocus="upDate(this)"
                     onblur="undo()">
                <figcaption>Tropical Beach</figcaption>
            </figure>
            
            <figure class="photo-figure">
                <img class="preview" 
                     src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=400&h=300&fit=crop" 
                     alt="Autumn forest path covered with red and orange fallen leaves"
                     onmouseover="upDate(this)" 
                     onmouseout="undo()"
                     onfocus="upDate(this)"
                     onblur="undo()">
                <figcaption>Autumn Path</figcaption>
            </figure>
            
            <figure class="photo-figure">
                <img class="preview" 
                     src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=300&fit=crop" 
                     alt="Foggy mountain valley with pine trees silhouetted against mist"
                     onmouseover="upDate(this)" 
                     onmouseout="undo()"
                     onfocus="upDate(this)"
                     onblur="undo()">
                <figcaption>Misty Valley</figcaption>
            </figure>
            
            <figure class="photo-figure">
                <img class="preview" 
                     src="https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=400&h=300&fit=crop" 
                     alt="Starry night sky over snow-capped mountains with Milky Way visible"
                     onmouseover="upDate(this)" 
                     onmouseout="undo()"
                     onfocus="upDate(this)"
                     onblur="undo()">
                <figcaption>Starry Mountains</figcaption>
            </figure>
        </div>
    </main>

    <script src="Untitled-3.js"></script>
</body>
</html>
